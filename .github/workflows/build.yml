name: Rebuild sito ricette

on:
  push:
    paths:
      - 'ricette.txt'
      - 'ricette/**'
  workflow_dispatch:

concurrency:
  group: build-ricette
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build index.html
        run: python scripts/build.py

      - name: Commit e push index.html
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet && echo "Nessuna modifica" && exit 0
          git commit -m "🍝 Aggiornamento ricette $(date +'%Y-%m-%d %H:%M')"
          git push origin HEAD:main --force-with-lease
