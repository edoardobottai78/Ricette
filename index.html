<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Mie Ricette</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #F7F4EF;
  --ink: #1C1A17;
  --muted: #9A948A;
  --border: #DDD8D0;
  --accent: #C4853A;
  --surface: #EFEBE4;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.site-header {
  padding: 64px 48px 48px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 24px;
}
.header-left h1 {
  font-size: clamp(3rem, 7vw, 6rem);
  font-weight: 300;
  line-height: 0.9;
  letter-spacing: -2px;
  color: var(--ink);
}
.header-left h1 em {
  font-style: italic;
  color: var(--accent);
}
.header-meta {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 16px;
}
.header-right {
  text-align: right;
}
.total-count {
  font-size: 5rem;
  font-weight: 300;
  color: var(--border);
  line-height: 1;
  letter-spacing: -3px;
}
.total-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* SEARCH */
.search-wrap {
  padding: 24px 48px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
}
.search-wrap input {
  background: none;
  border: none;
  outline: none;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  color: var(--ink);
  width: 100%;
  font-style: italic;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { color: var(--muted); flex-shrink: 0; }

/* NAV */
.cat-nav {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  padding: 0 48px;
}
.cat-nav::-webkit-scrollbar { display: none; }
.cat-tab {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 16px 0;
  margin-right: 32px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: color .2s, border-color .2s;
  flex-shrink: 0;
}
.cat-tab:hover { color: var(--ink); }
.cat-tab.active { color: var(--ink); border-bottom-color: var(--accent); }

/* MAIN */
.main { padding: 0 48px 80px; }

/* CATEGORY BLOCK */
.cat-block { display: none; }
.cat-block.visible { display: block; }
.cat-heading {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 48px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}
.cat-icon {
  width: 48px;
  height: 48px;
  flex-shrink: 0;
}
.cat-name {
  font-size: 2.4rem;
  font-weight: 300;
  letter-spacing: -1px;
}
.cat-n {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
}

/* RECIPE LIST */
.recipe-list { list-style: none; }
.recipe-row {
  display: flex;
  align-items: baseline;
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.recipe-row:hover { background: var(--surface); margin: 0 -48px; padding: 18px 48px; }
.recipe-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  width: 36px;
  flex-shrink: 0;
}
.recipe-name {
  font-size: 1.35rem;
  font-weight: 400;
  flex: 1;
  line-height: 1.3;
}
.recipe-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--accent);
  letter-spacing: 1px;
  margin-left: 12px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity .2s;
}
.recipe-row:hover .recipe-badge { opacity: 1; }
.recipe-arrow {
  color: var(--muted);
  margin-left: 12px;
  flex-shrink: 0;
  transition: transform .2s, color .2s;
}
.recipe-row:hover .recipe-arrow { transform: translateX(4px); color: var(--accent); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(28,26,23,.7);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  width: 100%; max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  transform: translateY(16px);
  transition: transform .25s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  padding: 40px 40px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.modal-icon {
  width: 56px; height: 56px;
  flex-shrink: 0;
  opacity: .6;
}
.modal-close {
  background: none; border: none;
  font-size: 1.5rem; color: var(--muted);
  cursor: pointer; line-height: 1;
  transition: color .2s;
  padding: 4px;
}
.modal-close:hover { color: var(--ink); }
.modal-body { padding: 24px 40px 40px; }
.modal-cat {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--muted);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 12px;
}
.modal-title {
  font-size: 2.2rem;
  font-weight: 300;
  line-height: 1.1;
  letter-spacing: -1px;
  margin-bottom: 28px;
}
.modal-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 0 0 24px;
}
.modal-note {
  font-size: 1.05rem;
  line-height: 1.8;
  color: #4A4540;
  white-space: pre-wrap;
  font-style: italic;
}
.modal-empty {
  font-size: 1rem;
  color: var(--muted);
  font-style: italic;
}
.modal-section-title {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  margin-top: 24px;
}
.modal-section-title:first-child { margin-top: 0; }
.modal-ingredienti {
  list-style: none;
  margin-bottom: 8px;
}
.modal-ingredienti li {
  font-size: 1.05rem;
  line-height: 1.8;
  color: #4A4540;
  padding-left: 16px;
  position: relative;
}
.modal-ingredienti li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--accent);
}
.modal-procedimento {
  font-size: 1.05rem;
  line-height: 1.8;
  color: #4A4540;
  white-space: pre-wrap;
}

/* NO RESULTS */
.no-results {
  display: none;
  padding: 80px 0;
  text-align: center;
  color: var(--muted);
  font-style: italic;
  font-size: 1.3rem;
}
.no-results.visible { display: block; }

@media (max-width: 600px) {
  .site-header, .search-wrap, .cat-nav, .main { padding-left: 24px; padding-right: 24px; }
  .recipe-row:hover { margin: 0 -24px; padding: 18px 24px; }
  .modal-header, .modal-body { padding-left: 24px; padding-right: 24px; }
  .site-header { padding-top: 40px; flex-direction: column; align-items: flex-start; }
  .header-right { text-align: left; }
}
</style>
</head>

tipasti & Stuzzichini", "note": "http://pubx.co/qX5HbS", "detail": null}, {"id": 233, "title": "Spice-loaded meatballs with a Turkish inflection.", "cat": "Antipasti & Stuzzichini", "note": "https://cooking.nytimes.com/recipes/1019197-spiced-lamb-meatballs-with-yogurt-and-herbs", "detail": null}, {"id": 234, "title": "il risotto arachidi, nduja e cicoria", "cat": "Primi Piatti", "note": "http://www.gustoblog.it/post/228420/ricette-masterchef-8-il-risotto-arachidi-nduja-e-cicoria", "detail": null}, {"id": 235, "title": "Flank Steak Tacos with Cilantro Lime Yogurt Sauce", "cat": "Tacos & Street Food", "note": "http://www.thegarlicdiaries.com/flank-steak-tacos-with-cilantro-lime-yogurt-sauce/", "detail": null}, {"id": 236, "title": "Scalloped Hasselback Potatoes Recipe", "cat": "Antipasti & Stuzzichini", "note": "http://effen1.blogspot.jp/", "detail": null}, {"id": 237, "title": "Gnocchi di patate dolci con carciofi e crema di parmigiano reggiano", "cat": "Primi Piatti", "note": "https://blog.giallozafferano.it/ombraincucina/gnocchi-di-patate-dolci-con-carciofi-e-crema-di-parmigiano-reggiano/", "detail": {"ingredienti": ["ngredienti per 4 persone", "– 1 kg di patate dolci /Americane", "– 300 g di farina 00 piu q.b.", "– sale q.b.", "– 4 cuori di carciofo", "– olio evo q.b.", "– pepe q.b.", "– 1/2 bicchiere di vino bianco secco", "– 120 ml di latte", "– 30 gr di burro", "– 1 cucchiaio di farina", "– noce moscata q.b.", "– 60 gr di parmigiano reggiano grattuggiato il piu fine possibile"], "procedimento": "Lessare le patate in abbondante acqua salata\nQuando saranno tenere sbucciarle e schiacciarle con lo schiacciapatate ( senza farle raffreddare )\nMetterle in una ciotola aggiungere un pizzico di sale e la farina setacciata poco per volta\nRegolatevi se dovesse servire altra farina , il composto dovra essere comunque morbido\nInfarinare un piano di lavoro e formare dei serpentelli non troppo grossi\nTagliarli a pezzettini formando gli gnocchi .\nPreparare i carciofi\nEliminare le foglie esterne piu dure e la barba interna\nTagliarli a listerelle sottili\nTritare lo scalogno\nIn una capiente padella antiaderente mettere 2 cucchiai di olio evo , aggiungere lo scalogno e i carciofi\nCuocere 5 minuti sfumare con il vino coprire e portare a cottura ( dovranno rimaere croccanti )\nQuando saranno pronti aggiungere una macinata di pepe\nPreparare la crema di parmigiano reggiano\nSciogliere il burro in una casseruola a fiamma bassa .\nQuando sara’ sciolto versare la farina e mescolare\nAggiungere il latte a filo sempre mescolando per non formare grumi\nQuando il latte sara’ caldo ma prima che prenda il bollore aggiungere la noce moscata e il parmigiano reggiano\nFar addensare la crema\nLessare gli gnocchi , scolarli nella padella dei carciofi e far insaporire\nImpiattare aggiungendo la crema di parmigiano reggiano sul fondo del piatto e adagiare gli gnocchi"}}, {"id": 238, "title": "Dumpling and noodles", "cat": "Antipasti & Stuzzichini", "note": "https://www.pinterest.com", "detail": null}, {"id": 239, "title": "Il risotto con crema di carote e gorgonzola", "cat": "Primi Piatti", "note": "https://cucina.fidelityhouse.eu/primi-piatti/risotto-con-crema-di-carote-e-gorgonzola-200094.html", "detail": null}, {"id": 240, "title": "Il risotto con pere, scamorza affumicata e noci", "cat": "Primi Piatti", "note": "https://cucina.fidelityhouse.eu/primi-piatti/risotto-con-pere-scamorza-affumicata-e-noci-207222.html", "detail": null}, {"id": 241, "title": "Ham and Potato Corn Chowder", "cat": "Zuppe & Vellutate", "note": "http://www.closetcooking.com/2015/04/ham-and-potato-corn-chowder.html", "detail": null}, {"id": 242, "title": "ravioli al pecorino di fossa e ricotta", "cat": "Primi Piatti", "note": "http://www.cavolettodibruxelles.it/2005/11/ravioli-al-formaggio-di-fossa-con-salsa-di-pere-e-balsamico", "detail": null}, {"id": 243, "title": "Mashed potatoes", "cat": "Antipasti & Stuzzichini", "note": "http://tiphero.com/mashed-potato-cheese-bites/", "detail": null}, {"id": 244, "title": "Pop corn cavolfiore", "cat": "Antipasti & Stuzzichini", "note": "", "detail": null}, {"id": 245, "title": "Corn Ribs", "cat": "Antipasti & Stuzzichini", "note": "", "detail": {"ingredienti": ["Pannocchie", "Olio", "Paprika", "Sale"], "procedimento": "Sbollentare per 5 minuti le pannocchie, poi asciugarle tagliarle e cospargerle con olio sale e paprika. Cuocerle in forno per 20-25 minuti a 200 gradi"}}, {"id": 246, "title": "Pizza pesto di cavolo nero e nocciola con nduja", "cat": "Pizza & Focaccia", "note": "", "detail": null}, {"id": 247, "title": "Sgrafignoni Gnocchi di Pangrattato", "cat": "Primi Piatti", "note": "", "detail": {"ingredienti": ["120g di pangrattato", "60g di Parmigiano Reggiano grattugiato", "2 uova", "1 cucchiaio di farina", "1/2 cucchiaino di sale", "30g di burro", "2 o 3 cucchiai di latte"], "procedimento": "Mescolate tutti gli ingredienti, regolando il latte in modo da ottenere un impasto morbido (non preoccupatevi se appiccica un po’, il pangrattato lo asciugherà assorbendo l’eccesso).\nFate riposare per una ventina di minuti, poi ricavate delle palline ed affusolatele (oppure delle quenelle con 2 cucchiai).\nTuffate gli gnocchi in acqua bollente salata, sono pronti non appena vengono a galla.\nConditeli a piacere ripassandoli in padella con burro e salvia, oppure saltateli nel sugo e serviteli ancora bollenti"}}, {"id": 248, "title": "Risotto con polpo", "cat": "Primi Piatti", "note": "", "detail": {"ingredienti": ["PER IL RISOTTO", "Vino1 bicchiere", "Saleq.b.", "Riso160 g", "PER LA CREMA DI BURRO", "Pomodori10", "Capperiq.b.", "Oliveq.b.", "Pepeq.b.", "Saleq.b.", "Burro40 g", "PER IL POLPO", "Tentacoli4"], "procedimento": "Tostare il riso in una padella antiaderente senza grassi aggiunti, salare e sfumare con il vino bianco. Evaporato il vino aggiungere il brodo e portare il riso a cottura.\nSTEP 2\nFrullare il burro con i pomodorini, capperi, olive, pepe e sale. Aggiungere la crema al riso a fine cottura e mantecare.\nSTEP 3\nCon l'aiuto di un coppa pasta impiattare il risotto e aggiungere il polpo precedentemente bollito e insaporito con sale e olio."}}, {"id": 249, "title": "TONNO MARINATO MIELE E BIRRA", "cat": "Antipasti & Stuzzichini", "note": "", "detail": {"ingredienti": ["x4 persone", "200/300 g di trancio di tonno (abbattuto)", "mezzo mango", "2 cucchiaini colmi di miele", "2 cucchiai di salsa di solida", "30ml di birra chiara", "mezzo avocado", "1 cucchiaio di succo di limone", "200ml di salsa teriyaki", "semi di sesamo neri per decorare", "scorza di limone (facoltativa)", "salsa sriracha (facoltativa)", "sale", "olio evo"], "procedimento": "Come prima cosa passate il tonno velocemente sotto l’acqua fredda, tamponatelo bene e iniziate a preparare la marinatura. In una ciotola mettete miele, birra, 1 cucchiaio di olio e la salsa di soia, mescolate tutto e immergete il tonno (potete se non vi piace il tonno, sostituirlo con per esempio del salmone). Coprite con della pellicola e lasciate riposare in frigorifero per almeno 1 ora. Nel mentre tagliate il mango facendo delle fettine il più sottili possibile, se avete una mandolina potete aiutarvi con quella. Tagliato il mango, preparate il dip di avocado, molto semplicemente con una forchetta (se volete potete usare anche un mixer), schiacciate fino a creare una purea, aggiungete succo di limone, 1 cucchiaio di olio e aggiustate di sale. Ora mettete sul fuoco una padella antiaderente, fuoco medio alto e fate scaldare. Tirate fuori il tonno e scottate in padella per 1 secondo da entrambi i lati, non deve starci di più. Tagliate il tonno a fette sottili, sempre il più possibile e impiattate(in base a quante fettine vi vengono dividete per le quattro porzioni): salsa teriyaki sul fondo, fettine di mango, tonno, dip di avocado su ogni fettina di tonno, una puntina di salsa sriracha (se vi piace), scorza di limone, semi di sesamo e servite"}}, {"id": 250, "title": "Risotto stracciatella gamberi lamponi", "cat": "Primi Piatti", "note": "", "detail": {"ingredienti": ["https://pin.it/1LS3e0QyA", "Gamberi rossi: 6", "Olio evo: q.b.", "Sale: q.b.", "Pepe: q.b.", "Gusci di gamberi rossi: 8", "Cipolla piccola: 1", "Carota: 1", "Prezzemolo: q.b.", "Pomodorini: 2-3", "Vino bianco: 1 bicchiere", "Acqua: 250-300 ml", "Olio evo: q.b.", "Sale: q.b.", "Olio evo: q.b.", "Scalogno: 1 piccolo", "Lamponi: 125 g", "Zucchero: 25 g", "Acqua: 25 g", "Agar Agar: 1 g", "Riso carnaroli: 160 g", "Burrata: 130 g", "Gamberi rossi: 6", "Burro: 30 g", "Vino bianco: mezzo bicchiere", "Lamponi ghiacciati: 6", "Salsa ai lamponi: q.b."], "procedimento": "In una casseruola unire l’olio, lo scalogno tritato finemente, i lamponi, lo zucchero e coprire con acqua; Far cuocere finché i lamponi si saranno completamente sfaldati, successivamente filtrare con un colino a maglie strette e versare in una casseruola portando al primo bollore, quindi versare l’agar agar, mescolare bene, e far raffreddare;\n2\nSgusciare i gamberi tenendo da parte i gusci e le teste per il brodo, ed eliminare l’intestino; Tagliare a tocchetti e condire con olio; extravergine d’oliva, sale e qualche fogliolina di menta. Lasciar marinare per 30 minuti;\n3\nIn una pentola riunire l’olio, la cipolla e la carota tritate finemente, gli scarti dei gamberi, e far rosolare qualche minuto; Quando gli scarti avranno preso colore sfumare con il vino bianco, e far evaporare l’alcool; Aggiungere il prezzemolo, i pomodorini, e l’acqua, e far cuocere un’ora; Infine filtrare con un colino a maglie strette, riportare sul fuoco il brodo, e aggiungere il sale;\n4\nMettere i lamponi in freezer la sera prima, o almeno qualche ora prima; Tagliare il burro per la mantecatura a cubetti, e metterlo in freezer; Tostare il riso a secco, e iniziare la cottura con il brodo bollente, aggiungendolo gradualmente man mano che viene assorbito, mescolando spesso; Trascorsi i minuti di cottura del riso aggiungere la stracciatella; Mantecare aggiungendo il burro freddo a dadini;\n5\nImpiattare il risotto con i gamberi crudi a tocchetti, i lamponi ghiacciati e la loro salsa, qualche fogliolina di menta e fiorellino edibile."}}, {"id": 251, "title": "Linguine agrumi e gamberi", "cat": "Antipasti & Stuzzichini", "note": "", "detail": {"ingredienti": ["https://pin.it/5OlTaLNOR", "Linguine agli agrumi con gamberi rosa,bisque e polvere di liquirizia", "Pasta e cereali", "360 g Linguine", "Birra, vino e liquori", "50 ml Brandy", "Altro", "Arancie", "600 g Gamberi", "Mandarini", "Olio", "Pepe nero", "Pepe rosa", "Polvere di liquirizia", "Pompelmo rosa", "1 Spicchio aglio"], "procedimento": "Puliamo bene i gamberi sciacquandoli e togliendo teste e carapaci. Realizziamo una bisque a freddo. Prendiamo gli scarti eliminando gli occhi e mettiamoli in un contenitore alto, con olio, un pizzico di sale, pepe rosa e acqua fredda. Frulliamo tutto e passiamo al setaccio. Teniamo da parte\nSTEP 2\nIniziamo a cuocere le linguine. In una pentola aggiungiamo acqua, portiamola a bollore e poi saliamola leggermente. Caliamo la pasta\nSTEP 3\nSoffriggiamo uno spicchio d’aglio e peperoncino in una padella. Appena l'aglio si sarà imbiondito togliamolo dalla padella ed aggiungiamo i gamberi. Cuociamo per un paio di minuti da entrambi i lati. Aggiungiamo il brandy e il succo degli agrumi. Continuiamo a cuocere per 2-3 minuti ancora. Non oltre 5 minuti. Togliamo i gamberi\nSTEP 4\nScoliamo le linguine molto al dente direttamente nella padella del condimento e terminiamo la cottura risottando la pasta. Aggiungiamo i gamberi e amalgamiamo con olio evo a filo\nSTEP 5\nVersiamo la bisque in un pentolino e facciamola ridurre\nSTEP 6\nSul fondo di un piatto disponiamo la bisque di gamberi, le linguine, i gamberi e, per un tocco in più, polvere di liquirizia"}}, {"id": 252, "title": "Linguine gambero arancia e asparagi", "cat": "Antipasti & Stuzzichini", "note": "", "detail": {"ingredienti": ["500g linguine aromatizzate all’arancia", "250g asparagi verdi pugliesi da produzione integrata", "2 arance biologiche", "20 gamberi rossi", "15 gamberi rossi più piccoli", "1 noce di burro", "2cucchiai friscous Salentino Petramarè al pepe nero", "q.b. Olio evo ( in questa ricetta ho utilizzato un olio verace della Tenuta Pesare di Manduria prodotto con due varietà di olive: Cellina e Oliarola )", "q.b. Sale"], "procedimento": "molto sottili e teneri, non occorrerà privarli dei filamenti. Teniamo da parte le puntarelle e tagliamo a metà i gambi privandoli della parte inferiore più coriacea. Prepariamo un brodo vegetale con i gambi degli asparagi, la cipolla e la carota. Utilizzeremo il brodo per risottare la pasta e frulleremo e passeremo al setaccio i gambi, una volta cotti nel brodo, per ottenerne la polpa che utilizzeremo in fase di mantecatura della pasta.\nFase 2\nRipassiamo in pentola le puntarelle degli asparagi rosolandoli velocemente in una noce di burro, devono rimanere croccanti. Rimuoviamoli dalla pentola e teniamoli da parte\nFase 3\nDedichiamoci alla pulizia dei gamberi, rimuovendo il carapace e l’intestino, facendo attenzione a non disperdere il contenuto delle teste, il corallo del gambero, che raccoglieremo in un bicchiere del mixer, schiacciando le teste, per preparare una “maionese di mare” (ovviamente senza l’utilizzo dell’uovo) con l’aggiunta di olio evo, succo di arancia e qualche piccolo gamberetto che donerà colore. Mettiamo a marinare i gamberi ripuliti, con succo di arancia e olio evo e teniamoli al fresco Mettiamo a bollire l’acqua e caliamo la pasta per qualche minuto perchè ultimeremo la cottura risottando la pasta in un’altra pentola e utilizzando il brodo vegetale preparato, il succo di arancia e l’estratto setacciato di asparago. Quando è quasi pronta la pasta aggiungiamo in pentola parte della “maionese di mare” e lasciamo che tutti i profumi si fondano nel piatto in un gusto unico ed equilibrato. Aggiungiamo della scorza di arancia biologica prima di impiattare"}}, {"id": 253, "title": "Polpette tofu e patate", "cat": "Secondi Piatti", "note": "", "detail": {"ingredienti": ["https://pin.it/6RsSbUYzD", "Polpette di patate e tofu in salsa curry", "Prodotti da frigo", "360 g Di tofu", "Ingredienti in polvere", "2 Cucchiaino di garam masala", "Bevande", "200 ml Di latte di cocco in brick", "Altro", "1 Cipolla", "½ cucchiaino di curcuma", "1 Cucchiaino di semi di finocchietto", "½ cucchiaino di zenzero in polvere", "1 Cucchiaio di succo di limone", "25 g Di amido di mais", "30 g Di anacardi al naturale", "600 g Di patate", "400 g Di polpa di pomodoro", "1 Pizzico di peperoncino", "1 Pizzico di sale", "1 Presa di sale"], "procedimento": "Pelate, tagliate a cubetti e lessate le patate fino a che non saranno morbide. Schiacciatele con lo schiaccia patate e lasciatele raffreddare.\nFormiamo le polpette\nTamponate il tofu con della carta assorbente in modo da eliminare quanta più acqua possibile, poi tagliatelo a cubetti e mettetelo nel tritatutto; frullatelo fino ad ottenere una crema morbida, unendo poi anche le patate, il garam masala, il succo di limone, il sale e l’amido di mais. Formate 24 polpette, spennellatele di olio e infornate in forno preriscaldato a 200°C per 30 minuti. Prepariamo la salsa al curry\nTritate la cipolla, scaldate un goccio d’olio con le spezie, unite la cipolla e un pizzico di sale e lasciate soffriggere qualche minuto. Aggiungete gli anacardi, la polpa di pomodoro e il latte di cocco e lasciate cuocere la salsa per 20 minuti senza coperchio. Trasferite il sugo nel frullatore o nel bicchiere alto del minipimer e frullate fino ad ottenere una salsa fluida.\nCompletiamo il piatto\nVersate la salsa al curry nuovamente nella padella, unite le polpette e lasciate insaporire un paio di minuti. Completate il piatto con un goccio di latte di cocco e un pizzico di prezzemolo e servite."}}, {"id": 254, "title": "Polpette di tofu profumate", "cat": "Secondi Piatti", "note": "", "detail": {"ingredienti": ["Per 8-10 polpette", "150 gr. di tofu naturale", "1 cucchiaio di farina di ceci250 gr. di passata di pomodoro", "1 spicchio di aglio", "15 capperi sotto sale", "rosmarino, timo, maggiorana q.b.", "(fresche o essiccate a seconda della disponibilità)", "olio extra vergine di oliva q.b.", "sale q.b.", "pepe nero q.b."], "procedimento": "Frullare il tofu con la farina di ceci e un cucchiaio di olio extra vergine di oliva fino ad ottenere un composto omogeneo e malleabile.\nInsaporire con sale e pepe nero.\nFormare le polpette di tofu e farle riposare in frigorifero per mezz’ora coperte con pellicola trasparente.\nNel frattempo preparare il sugo di pomodoro scaldando due cucchiai di olio extra vergine di oliva con uno spicchio di aglio in camicia.\nAggiungere la passata di pomodoro, profumare a piacere con le erbette aromatiche, insaporire con in capperi precedentemente dissalati e cuocere a fiamma media per circa quindici minuti.\nAggiustare di sale se necessario.\nSistemare in padella le polpette di tofu e cuocerle a fiamma dolce cinque minuti per lato (girandole a metà cottura con molta delicatezza aiutandosi con una spatola). Far riposare per qualche minuto e spolverizzare con una macinata di pepe nero."}}, {"id": 255, "title": "Risotto peperone e crema di pecorino", "cat": "Primi Piatti", "note": "", "detail": {"ingredienti": ["Ingredienti per 2 persone", "– 160 g di riso carnaroli", "– 100 g di peperone rosso", "– 1 cipollina bianca piccola", "– 30 g di formaggio pecorino fresco del Caseificio Artigianale Dragone Talsano (Ta)", "– olio extra vergine di olive leccine", "– 20 g di burro di panna di masseria pugliese", "– 20 g di parmigiano reggiano", "– foglie di origano fresco", "– sale"], "procedimento": "Lavare, asciugare e tagliare a piccoli pezzi il peperone. Rosolarlo in padella con 1 cucchiaio d’olio, la cipollina tritata e il sale. Cuocere con coperchio per 15 minuti. Unire se necessario un mestolino di acqua bollente. Quando cotto frullare e tenere in caldo.\nFrullare il pecorino fresco con qualche cucchiaio di acqua tiedipa. Dovrà risultare un composto cremoso.\nTostare il riso con 2 cucchiai di olio, risottarlo quindi con acqua bollente salata. A 2 minuti dal termine della cottura, aggiungere la crema di peperone ed amalgamare con cura. A cottura ultimata, togliere dal fuoco e mantecare con burro e parmigiano.\nImpiattare e rifinire con la crema di pecorino e le foglioline di origano fresco. Servire subito."}}, {"id": 256, "title": "Risotto melograno e pere", "cat": "Primi Piatti", "note": "", "detail": {"ingredienti": ["https://pin.it/7z79BoQJZ", "Risotto con melograno e pere", "Ingredienti", "200 g riso Carnaroli", "1 pera", "1 melograno", "60 ml vino rosso", "1 cucchiaino zucchero", "1 cucchiaino amido di mais", "q.b. sale", "q.b. pepe", "100 g formaggio spalmabile", "Qualche foglia menta"], "procedimento": "Con l’aiuto di uno spremiagrumi estraiamo il succo dal melograno, lo filtriamo con un colino e versiamo il vino rosso nel recipiente. Aggiungiamo ora lo zucchero, il sale, il pepe e l’amido di mais, mescoliamo bene per evitare la formazione di grumi, versiamo il tutto in una casseruola.\nFacciamo cuocere sul fuoco mescolando finché il composto non si addenserà. Passiamo ora alla preparazione del risotto. Tostiamo bene il riso in un tegame, quando sarà ben caldo aggiungiamo il brodo e lasciamo cuocere lentamente.\nNel frattempo tagliamo la pera a cubetti, ci servirà tra poco. Versiamo la pera tagliata nel riso e proseguiamo la cottura. Una volta pronto aggiungiamo il formaggio spalmabile, giusto il tempo di sciogliersi ed il risotto è pronto per essere impiattato. Utilizziamo la salsa preparata e aggiungiamo alcuni chicchi di melograno e alcune foglie di menta per completare.\nhttps://blog.giallozafferano.it/dilettasecco/ricetta-risotto-con-melograno-e-pere/?utm_source=Pinterest&utm_medium=organic"}}, {"id": 257, "title": "Sofficini senza glutine", "cat": "Antipasti & Stuzzichini", "note": "", "detail": {"ingredienti": ["Acqua 250g", "Olio 1 cucchiaio", "Farina di riso 200g", "Sale 1 pizzico"], "procedimento": "In un pentolino, porta a bollore acqua + olio + sale. Appena bolle, spegni il fuoco e aggiungi la farina tutta insieme. Mescola energicamente con un cucchiaio di legno fino ad ottenere un impasto compatto e senza grumi. Lascia intiepidire leggermente, impasta stendi con un mattarello e forma dei dischi. Metti al centro il ripieno scelto, chiudi a mezzaluna sigillando bene i bordi. Cuoci in padella calda antiaderente 2/3 minuti per lato."}}];

function svgForCat(cat) {
  const m = META[cat];
  return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:${m.color}">${m.svg}</svg>`;
}

function buildNav() {
  const nav = document.getElementById('catNav');
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-tab active';
  allBtn.textContent = 'Tutte';
  allBtn.onclick = () => showCat('all', allBtn);
  nav.appendChild(allBtn);
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab';
    btn.textContent = cat;
    btn.onclick = () => showCat(cat, btn);
    nav.appendChild(btn);
  });
}

function buildSections() {
  const main = document.getElementById('main');
  const allSec = document.createElement('div');
  allSec.className = 'cat-block visible';
  allSec.dataset.cat = 'all';
  CATS.forEach(cat => {
    const recipes = RECIPES.filter(r => r.cat === cat);
    if (recipes.length) allSec.appendChild(buildCatBlock(cat, recipes));
  });
  main.appendChild(allSec);
  CATS.forEach(cat => {
    const recipes = RECIPES.filter(r => r.cat === cat);
    if (!recipes.length) return;
    const sec = document.createElement('div');
    sec.className = 'cat-block';
    sec.dataset.cat = cat;
    sec.appendChild(buildCatBlock(cat, recipes));
    main.appendChild(sec);
  });
}

function buildCatBlock(cat, recipes) {
  const m = META[cat];
  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <div class="cat-heading">
      <svg class="cat-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:${m.color}">${m.svg}</svg>
      <span class="cat-name">${cat}</span>
      <span class="cat-n">${recipes.length} ricette</span>
    </div>`;
  const ul = document.createElement('ul');
  ul.className = 'recipe-list';
  recipes.forEach((r, i) => {
    const li = document.createElement('li');
    li.className = 'recipe-row';
    li.dataset.title = r.title.toLowerCase();
    li.dataset.cat = r.cat.toLowerCase();
    const hasContent = r.detail || (r.note && r.note.trim());
    li.innerHTML = `
      <span class="recipe-num">${String(i+1).padStart(2,'0')}</span>
      <span class="recipe-name">${r.title}</span>
      ${hasContent ? '<span class="recipe-badge">RICETTA</span>' : ''}
      <svg class="recipe-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
    li.onclick = () => openModal(r);
    ul.appendChild(li);
  });
  wrap.appendChild(ul);
  return wrap;
}

function showCat(cat, btn) {
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cat-block').forEach(s => s.classList.toggle('visible', s.dataset.cat === cat));
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.recipe-row').forEach(r => r.style.display = '');
  document.getElementById('noResults').classList.remove('visible');
}

function filterRecipes(val) {
  const q = val.toLowerCase();
  let found = 0;
  document.querySelectorAll('.cat-block').forEach(s => s.classList.toggle('visible', s.dataset.cat === 'all'));
  document.querySelectorAll('.cat-tab').forEach((b,i) => b.classList.toggle('active', i===0));
  document.querySelectorAll('.recipe-row').forEach(row => {
    const match = !q || row.dataset.title.includes(q) || row.dataset.cat.includes(q);
    row.style.display = match ? '' : 'none';
    if (match) found++;
  });
  document.getElementById('noResults').classList.toggle('visible', found === 0);
}

function openModal(r) {
  const m = META[r.cat];
  document.getElementById('modalIcon').innerHTML = m.svg;
  document.getElementById('modalIcon').style.color = m.color;
  document.getElementById('modalCat').textContent = r.cat.toUpperCase();
  document.getElementById('modalTitle').textContent = r.title;
  const noteEl = document.getElementById('modalNote');
  if (r.detail) {
    let html = '';
    if (r.detail.ingredienti && r.detail.ingredienti.length > 0) {
      html += '<p class="modal-section-title">Ingredienti</p><ul class="modal-ingredienti">';
      r.detail.ingredienti.forEach(ing => {
        html += `<li>${ing.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</li>`;
      });
      html += '</ul>';
    }
    if (r.detail.procedimento) {
      html += '<p class="modal-section-title">Procedimento</p>';
      html += `<p class="modal-procedimento">${r.detail.procedimento.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`;
    }
    noteEl.innerHTML = html;
  } else if (r.note && r.note.trim()) {
    noteEl.innerHTML = `<div class="modal-note">${r.note.trim().replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
  } else {
    noteEl.innerHTML = `<p class="modal-empty">Nessuna nota aggiunta.</p>`;
  }
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

buildNav();
buildSections();
</script>
</body>
</html>
